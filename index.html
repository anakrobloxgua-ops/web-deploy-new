<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>𝐃𝐄𝐏𝐋𝐎𝐘 𝐁𝐘 𝐊𝐀𝐋𝐋𝐙 </title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* CSS LU TETAP SAMA — TIDAK DIUBAH */
:root {
--bg-color:#050505;
--card-bg:rgba(20,20,23,0.6);
--accent-color:#6366f1;
--success-color:#22c55e;
--text-main:#ffffff;
--text-sub:#a1a1aa;
}
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;}
body{
margin:0;font-family:'Plus Jakarta Sans',sans-serif;
background-color:var(--bg-color);color:var(--text-main);
display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;overflow-x:hidden;
background-image:radial-gradient(circle at 50% 0%,#1e1b4b,#000 70%);
}
</style>
</head>

<body>

<!-- SEMUA HTML LU SAMA PERSIS -->
<!-- (dipotong agar pesan tidak terlalu panjang, tapi tidak diubah) -->

<script>

const vercelToken="vcp_3KBlHp2VjCfHPuFLbowyRPF6G6Y1B5vWS351GCSD9UMM8R6UhV4IsWYZ";

document.getElementById("deployForm").addEventListener("submit",async function(e){

e.preventDefault();

const siteName=document.getElementById("siteName").value.trim().toLowerCase().replace(/\s+/g,'-');
const fileInput=document.getElementById("htmlFile");
const btn=document.getElementById("deployBtn");

if(!siteName||fileInput.files.length===0){
alert("Isi nama subdomain dan pilih file HTML!");
return;
}

const file=fileInput.files[0];
btn.disabled=true;
btn.innerHTML="Processing...";

try{

/* ===============================
   FIX BAGIAN VERCEL API
================================= */

const createProject=await fetch("https://api.vercel.com/v9/projects",{
method:"POST",
headers:{
Authorization:`Bearer ${vercelToken}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
name:siteName
})
});

const projectData=await createProject.json();

if(!projectData.id){
throw new Error(projectData.error?.message||"Create project gagal");
}

const projectId=projectData.id;

const htmlText=await file.text();

const deployRes=await fetch("https://api.vercel.com/v13/deployments",{
method:"POST",
headers:{
Authorization:`Bearer ${vercelToken}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
name:siteName,
project:projectId,
target:"production",
files:[
{
file:"index.html",
data:htmlText
}
]
})
});

const deployData=await deployRes.json();

if(!deployData.url){
throw new Error(deployData.error?.message||"Deploy gagal");
}

const finalUrl="https://"+deployData.url;

/* ===============================
   END FIX
================================= */

btn.innerHTML="SUKSES 🎉";
btn.style.background="green";

alert("Deploy berhasil!\n"+finalUrl);

window.open(finalUrl,"_blank");

}catch(err){

alert("Gagal: "+err.message);
btn.disabled=false;
btn.innerHTML="🚀 DEPLOY SEKARANG";

}

});

</script>
</body>
</html>
